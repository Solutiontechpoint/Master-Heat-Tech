<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Certificate viewer</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #525659;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <link rel="stylesheet" href="../assets/site-improvements.css" media="all" />
    <link rel="stylesheet" href="../assets/header.css" media="all" />

</head>
<body>
        <a class="skip-link" href="#main-content">Skip to main content</a>

    <iframe id="pdf-frame" title="Certificate"></iframe>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var file = params.get("file");

            if (!file || file.indexOf("..") !== -1) {
                document.body.innerHTML = "<p style=\"color:#fff;padding:1rem;font-family:sans-serif;\">Certificate not found.</p>";
                return;
            }

            var base = new URL(".", window.location.href).href;
            var pdfUrl = new URL(file, base).href + "#toolbar=0&navpanes=0&scrollbar=1";

            document.getElementById("pdf-frame").src = pdfUrl;
            document.addEventListener("contextmenu", function (event) {
                event.preventDefault();
            });
        }());
    </script>
    <script defer src="../assets/header.js"></script>
</body>
</html>
